<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even or Odd Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            display: inline-block;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Check Even or Odd</h2>
    <p>Koi bhi number daaliye aur check karein:</p>
    
    <!-- User input ke liye box -->
    <input type="number" id="userNumber" placeholder="Enter a number">
    <br>
    <button onclick="checkEvenOdd()">Check Number</button>

    <!-- Result yahan dikhega -->
    <div id="result"></div>
</div>

<script>
function checkEvenOdd() {
    // 4 Alag-alag variables jaisa assignment (Screenshot 2026-06-09 061359.png) me manga tha
    let inputField = document.getElementById("userNumber");
    let enteredValue = inputField.value;
    let finalNumber = Number(enteredValue);
    let remainder = finalNumber % 2;

    // Input check karne ke liye ki khali toh nahi hai
    if (enteredValue === "") {
        document.getElementById("result").innerText = "Kripya ek number dalein!";
        return;
    }

    // Even ya Odd ki condition (if-else)
    if (remainder === 0) {
        document.getElementById("result").innerText = "The number " + finalNumber + " is even.";
    } else {
        document.getElementById("result").innerText = "The number " + finalNumber + " is odd.";
    }
}
</script>

</body>
</html>
